services:
  dmpos_php:
    container_name: dmpos_php
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    restart: always
    volumes:
      - .:/var/www/html
    networks:
      - backend-network
      - dmpos-internal

  dmpos_nginx:
    image: nginx:alpine
    container_name: dmpos_nginx
    restart: always
    depends_on:
      - dmpos_php
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - frontend-network
      - dmpos-internal

networks:
  frontend-network:
    external: true
  backend-network:
    external: true
  dmpos-internal:
    driver: bridge
