services:
  dmpos_php:
    container_name: dmpos_php
    build:
      # context: './vendor/laravel/sail/runtimes/8.4'
      context: .
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    image: 'sail-8.4/app'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      WWWUSER: '${WWWUSER}'
      LARAVEL_SAIL: 1
      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
      XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
      IGNITION_LOCAL_SITES_PATH: '${PWD}'
    restart: always
    volumes:
      - .:/var/www/html
    networks:
      - backend-network
      - frontend-network

  dmpos_nginx:
    image: nginx:alpine
    container_name: dmpos_nginx
    restart: always
    depends_on:
      - dmpos_php
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - frontend-network

networks:
  frontend-network:
    external: true

  backend-network:
    external: true
