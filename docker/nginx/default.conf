server {
    listen 80;
    server_name _;
    root /var/www/html/public; 
    index index.php index.html;

    client_max_body_size 100M;

    # Route all requests to index.php if the file/folder doesn't exist
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP scripts to FastCGI server listening on dmpos_php:9000
    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_pass dmpos_php:9000;
        fastcgi_index index.php;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;

        # Important for Laravel behind Nginx Proxy Manager
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $http_x_forwarded_port;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;

        include fastcgi_params;
    }

    # Deny access to hidden files (.htaccess, .env, etc.)
    location ~ /\.ht {
        deny all;
    }
}