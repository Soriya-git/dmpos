<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Payment - Modern POS</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
            rel="stylesheet"
        />
        <style>
            :root {
                --color-primary: #2a4858;
                --color-secondary: #007882;
                --color-accent: #23aa8f;
                --color-success: #86d780;
                --color-highlight: #fafa6e;
            }
            body {
                background-color: rgba(42, 72, 88, 0.1);
                font-family:
                    'Inter',
                    system-ui,
                    -apple-system,
                    sans-serif;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .method-card {
                transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
                border: 2px solid transparent;
            }
            .method-card.active {
                border-color: var(--color-accent);
                background-color: #f0fdfa;
            }
            .method-card.active i {
                color: var(--color-accent);
            }
            .numpad-btn {
                transition: all 0.1s ease;
            }
            .numpad-btn:active {
                transform: scale(0.95);
                background-color: #e2e8f0;
            }
        </style>
    </head>
    <body>
        <!-- Payment Modal Container -->
        <div
            class="m-4 flex w-full max-w-5xl flex-col overflow-hidden rounded-3xl bg-white shadow-2xl md:flex-row"
        >
            <!-- Left Side: Summary & Methods (60%) -->
            <div class="flex-1 border-r border-gray-100 p-8">
                <div class="mb-8">
                    <h2 class="mb-1 text-2xl font-black text-[#2A4858]">
                        Payment Process
                    </h2>
                    <p class="text-sm font-medium text-gray-400">
                        Please select a payment method to continue
                    </p>
                </div>

                <!-- Total Display -->
                <div
                    class="relative mb-8 overflow-hidden rounded-2xl bg-[#2A4858] p-6 text-white"
                >
                    <div class="relative z-10">
                        <span
                            class="text-xs font-bold tracking-widest uppercase opacity-60"
                            >Total amount to pay</span
                        >
                        <div class="mt-1 flex items-baseline gap-2">
                            <h1
                                id="displayTotalUSD"
                                class="text-4xl font-black"
                            >
                                $22.57
                            </h1>
                            <span class="text-lg font-bold opacity-60"
                                >/ 92,500 KHR</span
                            >
                        </div>
                    </div>
                    <div
                        class="absolute -right-4 -bottom-4 h-24 w-24 rounded-full bg-white/10 blur-2xl"
                    ></div>
                </div>

                <!-- Payment Methods Grid -->
                <div class="grid grid-cols-2 gap-4 lg:grid-cols-3">
                    <button
                        onclick="selectMethod('cash-khr', 'KHR')"
                        class="method-card group active flex flex-col items-center gap-2 rounded-2xl bg-gray-50 p-4"
                        id="btn-cash-khr"
                    >
                        <div
                            class="flex h-10 w-10 items-center justify-center rounded-full bg-white shadow-sm transition-transform group-hover:scale-110"
                        >
                            <i
                                class="fas fa-money-bill-wave text-[#23AA8F]"
                            ></i>
                        </div>
                        <span
                            class="text-[10px] font-black text-[#2A4858] uppercase"
                            >Cash KHR</span
                        >
                    </button>

                    <button
                        onclick="selectMethod('cash-usd', 'USD')"
                        class="method-card group flex flex-col items-center gap-2 rounded-2xl bg-gray-50 p-4"
                        id="btn-cash-usd"
                    >
                        <div
                            class="flex h-10 w-10 items-center justify-center rounded-full bg-white shadow-sm transition-transform group-hover:scale-110"
                        >
                            <i class="fas fa-dollar-sign text-[#23AA8F]"></i>
                        </div>
                        <span
                            class="text-[10px] font-black text-[#2A4858] uppercase"
                            >Cash USD</span
                        >
                    </button>

                    <button
                        onclick="selectMethod('ebanking-khr', 'KHR')"
                        class="method-card group flex flex-col items-center gap-2 rounded-2xl bg-gray-50 p-4"
                        id="btn-ebanking-khr"
                    >
                        <div
                            class="flex h-10 w-10 items-center justify-center rounded-full bg-white shadow-sm transition-transform group-hover:scale-110"
                        >
                            <i class="fas fa-mobile-alt text-[#007882]"></i>
                        </div>
                        <span
                            class="text-[10px] font-black text-[#2A4858] uppercase"
                            >E-Banking KHR</span
                        >
                    </button>

                    <button
                        onclick="selectMethod('ebanking-usd', 'USD')"
                        class="method-card group flex flex-col items-center gap-2 rounded-2xl bg-gray-50 p-4"
                        id="btn-ebanking-usd"
                    >
                        <div
                            class="flex h-10 w-10 items-center justify-center rounded-full bg-white shadow-sm transition-transform group-hover:scale-110"
                        >
                            <i class="fas fa-university text-[#007882]"></i>
                        </div>
                        <span
                            class="text-[10px] font-black text-[#2A4858] uppercase"
                            >E-Banking USD</span
                        >
                    </button>

                    <!-- Pay Later Method -->
                    <button
                        onclick="selectMethod('pay-later', 'USD')"
                        class="method-card group flex flex-col items-center gap-2 rounded-2xl bg-gray-50 p-4"
                        id="btn-pay-later"
                    >
                        <div
                            class="flex h-10 w-10 items-center justify-center rounded-full bg-white shadow-sm transition-transform group-hover:scale-110"
                        >
                            <i class="fas fa-clock text-orange-400"></i>
                        </div>
                        <span
                            class="text-[10px] font-black text-[#2A4858] uppercase"
                            >Pay Later</span
                        >
                    </button>
                </div>
            </div>

            <!-- Right Side: Interaction (40%) -->
            <div class="flex w-full flex-col bg-gray-50/50 p-8 md:w-[400px]">
                <!-- Cash Input Section -->
                <div id="cashInputSection" class="flex flex-1 flex-col">
                    <div class="mb-6">
                        <label
                            class="mb-2 block text-[10px] font-black tracking-widest text-gray-400 uppercase"
                            >Receive Amount</label
                        >
                        <div class="relative">
                            <span
                                id="currencySymbol"
                                class="absolute top-1/2 left-4 -translate-y-1/2 text-xl font-black text-[#2A4858]"
                                >KHR</span
                            >
                            <input
                                type="number"
                                id="receiveAmount"
                                placeholder="0.00"
                                class="w-full rounded-2xl border-2 border-gray-100 bg-white py-4 pr-4 pl-16 text-right text-2xl font-black text-[#2A4858] transition-all outline-none focus:border-[#23AA8F]"
                            />
                        </div>
                    </div>

                    <div
                        class="mb-8 rounded-2xl border border-[#86D780] bg-[#86D780]/20 p-5"
                    >
                        <div class="mb-1 flex items-center justify-between">
                            <span
                                class="text-[10px] font-bold tracking-wider text-[#2A4858] uppercase opacity-60"
                                >Change Due</span
                            >
                            <i class="fas fa-coins text-xs text-[#23AA8F]"></i>
                        </div>
                        <div class="flex items-baseline justify-between">
                            <h2
                                id="changeDisplay"
                                class="text-3xl font-black text-[#2A4858]"
                            >
                                0.00
                            </h2>
                            <span
                                id="changeSymbol"
                                class="font-bold text-[#2A4858] opacity-60"
                                >KHR</span
                            >
                        </div>
                    </div>

                    <div class="mb-8 grid grid-cols-3 gap-2">
                        <button
                            id="quickBtn1"
                            onclick="addAmount(1000)"
                            class="numpad-btn rounded-xl border border-gray-100 bg-white py-3 text-xs font-bold text-[#2A4858] shadow-sm"
                        >
                            +1,000
                        </button>
                        <button
                            id="quickBtn2"
                            onclick="addAmount(5000)"
                            class="numpad-btn rounded-xl border border-gray-100 bg-white py-3 text-xs font-bold text-[#2A4858] shadow-sm"
                        >
                            +5,000
                        </button>
                        <button
                            id="quickBtn3"
                            onclick="addAmount(10000)"
                            class="numpad-btn rounded-xl border border-gray-100 bg-white py-3 text-xs font-bold text-[#2A4858] shadow-sm"
                        >
                            +10,000
                        </button>
                        <button
                            onclick="clearAmount()"
                            class="col-span-3 py-2 text-xs font-bold text-red-400 hover:text-red-600"
                        >
                            Clear Amount
                        </button>
                    </div>
                </div>

                <!-- E-Banking Section -->
                <div
                    id="ebankingSection"
                    class="flex hidden flex-1 flex-col items-center justify-center text-center"
                >
                    <div
                        class="mb-4 flex h-24 w-24 items-center justify-center rounded-3xl bg-white shadow-inner"
                    >
                        <i class="fas fa-qrcode text-4xl text-[#23AA8F]"></i>
                    </div>
                    <p class="text-sm font-bold text-[#2A4858]">
                        Waiting for E-Banking Scan
                    </p>
                    <p class="mt-1 text-xs text-gray-400">
                        Status: Pending connection
                    </p>
                </div>

                <!-- Pay Later View -->
                <div
                    id="payLaterSection"
                    class="flex hidden flex-1 flex-col items-center justify-center text-center"
                >
                    <div
                        class="mb-4 flex h-20 w-20 items-center justify-center rounded-full bg-orange-50"
                    >
                        <i
                            class="fas fa-file-invoice text-3xl text-orange-400"
                        ></i>
                    </div>
                    <h3 class="text-lg font-black text-[#2A4858]">
                        Deferred Payment
                    </h3>
                    <p class="mt-2 px-6 text-xs text-gray-500">
                        The order will be saved as "Unpaid". You can settle the
                        balance later from the Order History.
                    </p>
                </div>

                <!-- Action Buttons -->
                <div class="mt-auto space-y-3">
                    <button
                        id="mainActionBtn"
                        onclick="processPayment()"
                        class="w-full rounded-2xl bg-[#23AA8F] py-4 text-sm font-black tracking-widest text-white uppercase shadow-lg shadow-[#23AA8F]/20 transition-all hover:-translate-y-0.5 hover:bg-[#007882]"
                    >
                        Receive Payment
                    </button>

                    <button
                        id="payLaterBtn"
                        onclick="confirmPayLater()"
                        class="w-full rounded-2xl bg-orange-400 py-4 text-sm font-black tracking-widest text-white uppercase shadow-lg shadow-orange-400/20 transition-all hover:-translate-y-0.5 hover:bg-orange-500"
                    >
                        Pay Later
                    </button>

                    <button
                        onclick="window.history.back()"
                        class="w-full rounded-2xl border-2 border-gray-100 bg-white py-4 text-sm font-black tracking-widest text-[#2A4858] uppercase transition-all hover:bg-gray-50"
                    >
                        Cancel
                    </button>
                </div>
            </div>
        </div>

        <script>
            let currentTotal = 22.57; // USD
            let exchangeRate = 4100;
            let selectedCurrency = 'KHR';
            let currentMethod = 'cash-khr';

            const receiveInput = document.getElementById('receiveAmount');
            const changeDisplay = document.getElementById('changeDisplay');
            const changeSymbol = document.getElementById('changeSymbol');
            const currencySymbol = document.getElementById('currencySymbol');

            const cashSection = document.getElementById('cashInputSection');
            const bankSection = document.getElementById('ebankingSection');
            const payLaterSection = document.getElementById('payLaterSection');

            const mainActionBtn = document.getElementById('mainActionBtn');
            const payLaterBtn = document.getElementById('payLaterBtn');

            function selectMethod(id, currency) {
                currentMethod = id;
                selectedCurrency = currency;

                document
                    .querySelectorAll('.method-card')
                    .forEach((c) => c.classList.remove('active'));
                document.getElementById('btn-' + id).classList.add('active');

                currencySymbol.innerText = currency;
                changeSymbol.innerText = currency;

                // Update Quick Buttons based on currency
                const q1 = document.getElementById('quickBtn1');
                const q2 = document.getElementById('quickBtn2');
                const q3 = document.getElementById('quickBtn3');

                if (currency === 'USD') {
                    q1.innerText = '+1.00';
                    q2.innerText = '+5.00';
                    q3.innerText = '+10.00';
                } else {
                    q1.innerText = '+1,000';
                    q2.innerText = '+5,000';
                    q3.innerText = '+10,000';
                }

                // UI Mode Switching
                cashSection.classList.add('hidden');
                bankSection.classList.add('hidden');
                payLaterSection.classList.add('hidden');

                mainActionBtn.classList.remove('hidden');
                payLaterBtn.classList.add('hidden');

                if (id === 'pay-later') {
                    payLaterSection.classList.remove('hidden');
                    mainActionBtn.classList.add('hidden');
                    payLaterBtn.classList.remove('hidden');
                } else if (id.includes('ebanking')) {
                    bankSection.classList.remove('hidden');
                    mainActionBtn.innerText = 'Confirm Bank Receipt';
                } else {
                    cashSection.classList.remove('hidden');
                    mainActionBtn.innerText = 'Receive Payment';
                }

                receiveInput.value = '';
                updateChange();
            }

            function updateChange() {
                const received = parseFloat(receiveInput.value) || 0;
                let totalInCurrency =
                    selectedCurrency === 'USD'
                        ? currentTotal
                        : currentTotal * exchangeRate;
                const change = received - totalInCurrency;

                if (change > 0) {
                    changeDisplay.innerText =
                        selectedCurrency === 'KHR'
                            ? Math.round(change).toLocaleString()
                            : change.toFixed(2);
                } else {
                    changeDisplay.innerText = '0.00';
                }
            }

            function addAmount(val) {
                const current = parseFloat(receiveInput.value) || 0;
                receiveInput.value = (current + val).toFixed(
                    selectedCurrency === 'USD' ? 2 : 0,
                );
                updateChange();
            }

            function clearAmount() {
                receiveInput.value = '';
                updateChange();
            }

            receiveInput.addEventListener('input', updateChange);

            function processPayment() {
                const received = parseFloat(receiveInput.value) || 0;
                let totalNeeded =
                    selectedCurrency === 'USD'
                        ? currentTotal
                        : currentTotal * exchangeRate;

                if (currentMethod.includes('cash') && received < totalNeeded) {
                    alert('Insufficient amount received!');
                    return;
                }

                mainActionBtn.innerHTML =
                    '<i class="fas fa-circle-notch fa-spin"></i> Processing...';
                mainActionBtn.disabled = true;

                setTimeout(() => {
                    alert(
                        'Payment Successful! Total: ' +
                            (selectedCurrency === 'USD'
                                ? '$' + currentTotal
                                : Math.round(totalNeeded).toLocaleString() +
                                  ' KHR'),
                    );
                    window.location.href = 'index.html';
                }, 1000);
            }

            function confirmPayLater() {
                if (
                    confirm(
                        'Confirm to save this order as unpaid for later settlement?',
                    )
                ) {
                    payLaterBtn.innerHTML =
                        '<i class="fas fa-circle-notch fa-spin"></i> Saving...';
                    setTimeout(() => {
                        alert(
                            "Order Saved. You can find this in 'Pending Payments'.",
                        );
                        window.location.href = 'index.html';
                    }, 1000);
                }
            }

            // Init
            selectMethod('cash-khr', 'KHR');
        </script>
    </body>
</html>
